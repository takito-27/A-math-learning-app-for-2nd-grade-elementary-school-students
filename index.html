<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>いろいろな計算</title>
    
</head>
<body>

<div class="container">
   <div id="cover-screen" class="cover-page">
        <button id="help-btn" class="help-btn" onclick="showHelp()">
            つかいかた
        </button>
    <div class="cover-content">

    <div class="cover-image">

        <img src="img/character.png" alt="キャラクター" class="cover-character">

    </div>

    <div class="cover-text">

        <div id="display-grade" class="grade-title">
            2年生
        </div>

        <h1 id="display-main-title" class="main-title">
            いろいろな計算
        </h1>

        <p class="cover-message">
            かけ算をして、答えを入れよう！
        </p>

        <button class="start-btn" onclick="showMenu()">
            はじめる！
        </button>

    </div>

</div>

</div>

    <div id="screen-menu" class="screen">
        <div class="nav-bar">
            <button class="back-btn" onclick="goToStart()">← もどる</button>
        </div>
        <div class="menu-container">
            <div class="menu-item"
                 onclick="openUnit(1)"><div class="triangle"></div>九九のけいさん①</div>
            <div class="menu-item" 
                 onclick="openUnit(2)"><div class="triangle"></div>九九のけいさん②</div>
            <div class="menu-item" 
                 onclick="openUnit(3)"><div class="triangle"></div>かけ算のもんだい①</div>
            <div class="menu-item" 
                 onclick="openUnit(4)"><div class="triangle"></div>かけ算のもんだい②</div>
        </div>
    </div>
    <div id="screen-problem-select" class="screen">
        <div class="nav-bar">
            <button class="back-btn"
                    onclick="showMenu()">
               ← もどる
            </button>
        </div>
        <h2 id="unit-title" class="page-title">
            九九のけいさん①
        </h2>
          
        <div id="problem-list">

        </div>
        <div class="problem-page-navigation">
            <button
                id="problem-page-prev"
                class="btn btn-blue"
                onclick="changeProblemPage(-1)">
                ← 前へ
            </button>

            <span id="problem-page-info"></span>

            <button
                id="problem-page-next"
                class="btn btn-blue"
                onclick="changeProblemPage(1)">
                次へ →
            </button>

        </div>
    </div>


<div class="question-box" id="question-text"></div>
    <div id="problem-screen">
        <div class="nav-buttons">
            <div class="nav-left-btns">
                <button class="btn btn-blue"
                onclick="showMenu()">
                ⌂
                </button>
                <button class="btn btn-blue" onclick="backToProblemSelect()">← もどる</button>
            </div>
            <span id="page-info"></span>
            <button class="btn btn-blue" onclick="moveQuestion(1)">つぎへ →</button>
        </div>
     
        <div id="unit-name" class="page-title">
            九九のけいさん①
        </div>
           
        <div class="problem-header">
            <div id="problem-title" class="problem-title">
                だい1もん
            </div>
            <div id="problem-stars" class="problem-stars">
            </div>
        </div>
        <div class="problem-content">
            <div id="problem-text" class="problem-text">
            </div>
        </div>

    

        <div class="result-row">
            <div id="result-message"></div>
            <button id="hint-btn" onclick="hintDisplay()" style="display:none;">
                ヒント
            </button>
        </div>

        <div id="options-section">
            <hr>
            <p id="options-instruction"></p>
            <div class="options-container">
                <div class="option-card" id="opt-A" onclick="selectOption('A')"><div id="draw-A"></div></div>
                <div class="option-card" id="opt-B" onclick="selectOption('B')"><div id="draw-B"></div></div>
                <div class="option-card" id="opt-C" onclick="selectOption('C')"><div id="draw-C"></div></div>
            </div>
        </div>

        <div id="formula-section-container" class="formula-section">
            <p id="formula-instruction"></p>
            <div id="formula-inputs"></div>
        </div>

        <div id="custom-keypad" class="keypad-container">
            <div class="keypad-grid">
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('left')">◀</button>
                <div style="visibility: hidden;"></div>
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('right')">▶</button>
                
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('7')">7</button>
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('8')">8</button>
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('9')">9</button>
                
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('4')">4</button>
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('5')">5</button>
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('6')">6</button>
                
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('1')">1</button>
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('2')">2</button>
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('3')">3</button>
                
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('backspace')">⌫</button>
                <button class="key-btn" onpointerdown="event.preventDefault(); pressKey('0')">0</button>
                <button class="key-btn enter-btn" onpointerdown="event.preventDefault(); pressKey('enter')">↵</button>
            </div>
        </div>

        <button class="btn" style="background:#51cf66; color:white; width:100%; font-size:1.5rem;" onclick="checkAnswer()">こたえあわせ！！</button>
        <div id="result-message" style="font-size:2rem; font-weight:bold; margin-top:15px;"></div>
    </div>
</div>
<div id="screen-result" class="screen">

    <h2 class="page-title">
        けっか
    </h2>

    <div id="total-result" class="total-result">

    </div>

<div id="result-area">

</div>
    <button class="btn btn-green"
        onclick="retryUnit()">
    🔄 もう一度チャレンジ
    </button>
    <button class="btn btn-blue"
            onclick="showMenu()">
        メニューにもどる
    </button>

</div>


<script src="script.js"></script>
</body>
</html>
